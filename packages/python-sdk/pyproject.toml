[project]
name = "inferencebrake"
version = "0.2.0"
description = "Python SDK for InferenceBrake - Loop detection for AI agents"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "requests>=2.31.0",
]

[project.optional-dependencies]
langchain = [
    "langchain-core>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["inferencebrake"]
