[project]
name = "inferencebrake-engine"
version = "0.1.0"
description = "Multi-layer reasoning loop detection engine for LLM agents"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "datasets>=4.5.0",
    "huggingface-hub>=1.4.1",
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "sentence-transformers>=5.2.2",
]

[project.optional-dependencies]
embeddings = [
    "sentence-transformers>=2.2.0",
    "torch>=2.0.0",
]
all = [
    "inferencebrake-engine[embeddings]",
]

[dependency-groups]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "ruff>=0.1.0",
    "inferencebrake-engine[all]",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["inferencebrake"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"

[tool.ruff]
line-length = 88
target-version = "py310"
